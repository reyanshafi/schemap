services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: schemap
      POSTGRES_PASSWORD: schemap
      POSTGRES_DB: schemap
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U schemap -d schemap"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    # noeviction is a BullMQ requirement: evicting keys under memory pressure corrupts queues
    command: redis-server --maxmemory-policy noeviction
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: schemap
      MINIO_ROOT_PASSWORD: schemap-secret
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # web console
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

  # one-shot: create the uploads bucket, then exit
  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 schemap schemap-secret &&
      mc mb --ignore-existing local/schemap-uploads
      "

volumes:
  pgdata:
  miniodata:
